name: Deploy

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: x.y.z
        required: true
        type: string


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Validate Tag Is on Main Branch
        if: github.event_name == 'push'
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "Error: Tag is not on main branch"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Clone Keystore Repository
        run: |
          git clone git@github.com:theruslanusmanov/android-keystore.git $RUNNER_TEMP/keystore-repo

      - name: Sign APK
        run: |
          ANDROID_SDK_PATH=$ANDROID_HOME/build-tools/36.0.0/apksigner
          $ANDROID_SDK_PATH sign \
            --ks $RUNNER_TEMP/keystore-repo/${{ secrets.KEYSTORE_FILE_NAME }} \
            --ks-key-alias ${{ secrets.RELEASE_SIGN_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.RELEASE_SIGN_KEY_PASSWORD }} \
            --out weatherapp-${{ env.VERSION }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Sign AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore $RUNNER_TEMP/keystore-repo/${{ secrets.KEYSTORE_FILE_NAME }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.RELEASE_SIGN_KEY_PASSWORD }} \
            app/build/outputs/bundle/release/app-release.aab \
            ${{ secrets.RELEASE_SIGN_KEY_ALIAS }}
          mv app/build/outputs/bundle/release/app-release.aab weatherapp-${{ env.VERSION }}.aab

      - name: Clean Up Keystore
        if: always()
        run: rm -rf $RUNNER_TEMP/keystore-repo

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifact
          path: weatherapp-${{ env.VERSION }}.apk
          compression-level: 5

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-artifact
          path: weatherapp-${{ env.VERSION }}.aab
          compression-level: 5

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Changes
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            release-notes
          sparse-checkout-cone-mode: false

      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-artifact

      - name: Generate Changelog
        run: |
          if [ -f "release-notes/${{ env.VERSION }}.md" ]; then
            cat "release-notes/${{ env.VERSION }}.md" > CHANGELOG.txt
          else
            echo "Release ${{ env.VERSION }}" > CHANGELOG.txt
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            weatherapp-${{ env.VERSION }}.apk
          body_path: CHANGELOG.txt
          tag_name: ${{ env.VERSION }}

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Changes
        uses: actions/checkout@v4

      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: aab-artifact

      - name: Deploy to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.theruslanusmanov.androidweatherapp
          releaseFiles: weatherapp-${{ env.VERSION }}.aab
          track: internal
          status: completed
          changesNotSentForReview: false
